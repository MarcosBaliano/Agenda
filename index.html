<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Agenda de Contatos MVC</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    
    <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Agenda de Contatos (MVC)</span>
    </div>
</nav>

<div class="container">
    <div id="alerta" class="alert d-none" role="alert"></div>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Novo Contato</h5>
        </div>
        <div class="card-body">
            <form id="form-contato" onsubmit="adicionarContato(this); return false;">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" name="nome" placeholder="Ex: Marcos Baliano" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Telefone (Apenas números)</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            name="telefone" 
                            placeholder="Ex: 11999999999" 
                            required
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" name="email" placeholder="email@exemplo.com" required/>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary px-4">Salvar Contato</button>
                    <button type="reset" class="btn btn-outline-secondary ms-2">Limpar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white">
            <h5 class="mb-0 text-primary">Contatos Salvos</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbl-contatos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module" src="main.mjs"></script>
</body>
</html>
